<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Shield outline -->
  <path d="M256 72c-72 0-144 32-144 32v176c0 88 144 160 144 160s144-72 144-160V104S328 72 256 72z"
        fill="none" stroke="white" stroke-width="16" stroke-linejoin="round" opacity="0.2"/>

  <!-- Heartbeat / pulse line -->
  <polyline points="100,280 180,280 210,200 240,360 270,180 300,320 330,260 360,280 412,280"
            fill="none" stroke="url(#pulse)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Letter K stylized -->
  <text x="256" y="180" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="800"
        fill="white" text-anchor="middle" dominant-baseline="central" opacity="0.9">K</text>

  <!-- Tagline arc -->
  <text font-family="Inter, system-ui, sans-serif" font-size="28" fill="white" opacity="0.7" text-anchor="middle">
    <textPath href="#tagline-path" startOffset="50%">KYTHR</textPath>
  </text>
  <path id="tagline-path" d="M128,420 Q256,470 384,420" fill="none"/>
</svg>
