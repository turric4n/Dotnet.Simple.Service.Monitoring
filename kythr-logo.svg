<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.4"/>
      <stop offset="20%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#e0e7ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Top-left ambient light -->
  <circle cx="180" cy="160" r="220" fill="white" opacity="0.035"/>

  <!-- Orbit ring -->
  <ellipse cx="256" cy="260" rx="190" ry="190" fill="none" stroke="url(#ring)" stroke-width="1.5" stroke-dasharray="8 12" opacity="0.6"/>

  <!-- Shield -->
  <path d="M256 88c-76 0-140 30-140 30v168c0 46 26 88 64 120s76 50 76 50 38-18 76-50 64-74 64-120V118S332 88 256 88z"
        fill="url(#shield-fill)" stroke="white" stroke-width="8" stroke-linejoin="round" stroke-opacity="0.3"/>

  <!-- Heartbeat EKG line — the hero element -->
  <polyline points="108,272 184,272 210,272 230,222 252,340 274,196 294,312 310,254 326,272 404,272"
           fill="none" stroke="url(#pulse)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Tiny dot at the peak for emphasis -->
  <circle cx="274" cy="196" r="6" fill="white" filter="url(#glow-sm)"/>
</svg>
