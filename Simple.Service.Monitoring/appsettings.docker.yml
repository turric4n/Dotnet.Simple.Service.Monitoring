# =============================================================================
# Simple.Service.Monitoring - Complete Docker Configuration Template
# =============================================================================
#
# This file documents EVERY configurable option for the monitoring suite.
# Copy this file, uncomment and adjust the sections you need.
#
# CONFIGURATION PRIORITY (highest wins):
#   1. Environment variables    (e.g. MONITORING_SETTINGS_USEGLOBALSERVICENAME=MyApp)
#   2. appsettings.{Env}.yml   (e.g. appsettings.Production.yml)
#   3. appsettings.yml          (base config)
#   4. Defaults
#
# ENVIRONMENT VARIABLE NAMING:
#   Use UPPERCASE with single underscores (_) as section separators.
#   Arrays use zero-based index: _0_, _1_, etc.
#
#   Examples:
#     MONITORINGUI_COMPANYNAME=ACME Corp
#     MONITORINGUI_DATAREPOSITORYTYPE=InMemory
#     MONITORING_SETTINGS_USEGLOBALSERVICENAME=Production
#     MONITORING_HEALTHCHECKS_0_NAME=My HTTP Check
#     MONITORING_HEALTHCHECKS_0_SERVICETYPE=Http
#     MONITORING_HEALTHCHECKS_0_ENDPOINTORHOST=https://api.example.com/health
#     MONITORING_HEALTHCHECKS_0_ALERT=true
#     MONITORING_HEALTHCHECKS_0_HEALTHCHECKCONDITIONS_HTTPBEHAVIOUR_HTTPEXPECTEDCODE=200
#     MONITORING_HEALTHCHECKS_0_ALERTBEHAVIOUR_0_TRANSPORTMETHOD=Email
#     MONITORING_HEALTHCHECKS_0_ALERTBEHAVIOUR_0_TRANSPORTNAME=PrimaryEmail
#     MONITORING_EMAILTRANSPORTSETTINGS_0_NAME=PrimaryEmail
#     MONITORING_EMAILTRANSPORTSETTINGS_0_PASSWORD=secret
#
# =============================================================================

Logging:
  LogLevel:
    Default: Information
    Microsoft: Warning
    Microsoft.Hosting.Lifetime: Information

AllowedHosts: "*"

# =============================================================================
# MONITORING UI CONFIGURATION
# =============================================================================
# Section bound via configuration.GetSection("MonitoringUi")
#
# Env var examples:
#   MONITORINGUI_COMPANYNAME=ACME Corp
#   MONITORINGUI_HEADERLOGOURL=https://example.com/logo.png
#   MONITORINGUI_DATAREPOSITORYTYPE=LiteDb
#   MONITORINGUI_SQLCONNECTIONSTRING=Server=...
# =============================================================================
MonitoringUi:
  # Company name displayed in the dashboard header
  CompanyName: "My Company"

  # Optional: Custom logo URL for the dashboard header
  HeaderLogoUrl: ""

  # Data storage backend for the UI dashboard
  # Options: InMemory, LiteDb, Sql
  # - InMemory: No persistence, data lost on restart
  # - LiteDb: File-based storage at /app/data/ (recommended for Docker)
  # - Sql: SQL Server storage (requires SqlConnectionString)
  DataRepositoryType: LiteDb

  # Required only when DataRepositoryType is Sql
  # SqlConnectionString: "Server=sqlserver;Database=MonitoringUI;User Id=sa;Password=YourPassword;"

# =============================================================================
# MONITORING CONFIGURATION
# =============================================================================
# Section bound via configuration.GetSection("Monitoring") -> MonitorOptions
#
# Env var examples:
#   MONITORING_SETTINGS_USEGLOBALSERVICENAME=Production Services
# =============================================================================
Monitoring:
  # ---------------------------------------------------------------------------
  # Global Settings
  # ---------------------------------------------------------------------------
  Settings:
    # Optional: Set a global service name prefix for all health checks
    UseGlobalServiceName: "Docker Monitoring"

  # ---------------------------------------------------------------------------
  # HEALTH CHECKS
  # ---------------------------------------------------------------------------
  # Define all service monitors here. Each entry creates a health check.
  #
  # Common fields for ALL service types:
  #   Name:                    string   - Unique name for this monitor
  #   ServiceType:             enum     - See below for all 26 types
  #   EndpointOrHost:          string   - Target host/URL (for HTTP, Ping, TCP, DNS, etc.)
  #   ConnectionString:        string   - Connection string (for databases, queues, etc.)
  #   Alert:                   bool     - Enable alerting for this monitor
  #   AlertBehaviour:          array    - Alert rules (see AlertBehaviour section below)
  #   HealthCheckConditions:   object   - Service-specific configuration
  #   AdditionalTags:          array    - Custom tags for categorization
  #   ExcludedInterceptionNames: array  - Interceptors to exclude
  #   FullClassName:           string   - Required for ServiceType: Custom
  #
  # ServiceType options (26 types):
  #   Http, Ping, Tcp, Dns, SslCertificate, Ftp, Smtp,
  #   MsSql, MySql, PostgreSql, Oracle, Sqlite,
  #   Redis, Memcached, MongoDb, CosmosDb,
  #   Rmq, Kafka, AzureServiceBus, AwsSqs,
  #   ElasticSearch, Hangfire, Grpc, Docker,
  #   Custom, Interceptor
  # ---------------------------------------------------------------------------
  HealthChecks:

    # =========================================================================
    # HTTP SERVICE MONITORING
    # =========================================================================
    # Env var: Monitoring__HealthChecks__0__*
    - Name: "HTTP API Health"
      ServiceType: Http
      EndpointOrHost: "https://api.example.com/health"
      Alert: true
      AdditionalTags:
        - "production"
        - "critical"
      HealthCheckConditions:
        HttpBehaviour:
          HttpExpectedCode: 200           # Expected HTTP status code
          HttpTimeoutMs: 5000             # Request timeout in milliseconds
          HttpVerb: Get                   # Options: Get, Post, Put, Delete
          # Custom HTTP headers (e.g. authentication, API keys)
          # CustomHttpHeaders:
          #   Authorization: "Bearer your-token-here"
          #   X-API-Key: "your-api-key"
        ServiceReach: true
        ServiceConnectionEstablished: true
      AlertBehaviour:
        - TransportMethod: Console
          TransportName: "DefaultConsole"
          AlertOnce: false
          AlertOnServiceRecovered: true
          AlertEvery: "00:05:00"
          AlertByFailCount: 3
          PublishAllResults: false
          IncludeEnvironment: true
          Timezone: "UTC"
          # UsePeriodicAlerting: true
          # StartAlertingOn: "08:00:00"
          # StopAlertingOn: "18:00:00"

    # =========================================================================
    # PING MONITORING
    # =========================================================================
    # Env var: Monitoring__HealthChecks__1__*
    - Name: "Server Ping"
      ServiceType: Ping
      EndpointOrHost: "google.com"
      Alert: true
      AdditionalTags:
        - "network"
      HealthCheckConditions:
        PingBehaviour:
          TimeOutMs: 5000
        ServiceReach: true
        ServiceConnectionEstablished: true
      AlertBehaviour:
        - TransportMethod: Console
          TransportName: "DefaultConsole"
          AlertOnce: true
          AlertOnServiceRecovered: true

    # =========================================================================
    # TCP MONITORING
    # =========================================================================
    - Name: "TCP Service"
      ServiceType: Tcp
      EndpointOrHost: "server.example.com"
      Alert: true
      HealthCheckConditions:
        TcpBehaviour:
          Port: 8080
          TimeOutMs: 5000
      AlertBehaviour:
        - TransportMethod: Console
          TransportName: "DefaultConsole"
          AlertOnce: true
          AlertOnServiceRecovered: true

    # =========================================================================
    # DNS MONITORING
    # =========================================================================
    - Name: "DNS Resolution"
      ServiceType: Dns
      EndpointOrHost: "example.com"
      Alert: true
      HealthCheckConditions:
        DnsBehaviour:
          ExpectedIpAddress: "93.184.216.34"
          TimeOutMs: 5000
      AlertBehaviour:
        - TransportMethod: Console
          TransportName: "DefaultConsole"
          AlertOnce: true
          AlertOnServiceRecovered: true

    # =========================================================================
    # SSL CERTIFICATE MONITORING
    # =========================================================================
    - Name: "SSL Certificate"
      ServiceType: SslCertificate
      EndpointOrHost: "example.com"
      Alert: true
      HealthCheckConditions:
        SslCertificateBehaviour:
          WarningDaysBeforeExpiry: 30
          Port: 443
          TimeOutMs: 10000
      AlertBehaviour:
        - TransportMethod: Console
          TransportName: "DefaultConsole"
          AlertOnce: true
          AlertOnServiceRecovered: true

    # =========================================================================
    # FTP MONITORING
    # =========================================================================
    - Name: "FTP Server"
      ServiceType: Ftp
      EndpointOrHost: "ftp.example.com"
      Alert: true
      HealthCheckConditions:
        FtpBehaviour:
          Port: 21
          UseSftp: false
          TimeOutMs: 10000
          # Username: "ftpuser"
          # Password: "ftppassword"
      AlertBehaviour:
        - TransportMethod: Console
          TransportName: "DefaultConsole"
          AlertOnce: true
          AlertOnServiceRecovered: true

    # =========================================================================
    # SMTP MONITORING
    # =========================================================================
    - Name: "SMTP Server"
      ServiceType: Smtp
      EndpointOrHost: "smtp.example.com"
      Alert: true
      HealthCheckConditions:
        SmtpBehaviour:
          Port: 587
          UseTls: true
          TimeOutMs: 10000
      AlertBehaviour:
        - TransportMethod: Console
          TransportName: "DefaultConsole"
          AlertOnce: true
          AlertOnServiceRecovered: true

    # =========================================================================
    # MICROSOFT SQL SERVER MONITORING
    # =========================================================================
    - Name: "SQL Server Database"
      ServiceType: MsSql
      ConnectionString: "Server=sqlserver;Database=MyApp;User Id=sa;Password=YourPassword;"
      Alert: true
      AdditionalTags:
        - "database"
      HealthCheckConditions:
        SqlBehaviour:
          Query: "SELECT 1"
          ResultExpression: Equal          # Options: Equal, NotEqual, GreaterThan, LessThan
          SqlResultDataType: Int           # Options: String, Int, Bool, DateTime
          ExpectedResult: 1
      AlertBehaviour:
        - TransportMethod: Console
          TransportName: "DefaultConsole"
          AlertOnce: false
          AlertOnServiceRecovered: true
          AlertEvery: "00:10:00"

    # =========================================================================
    # MYSQL MONITORING
    # =========================================================================
    - Name: "MySQL Database"
      ServiceType: MySql
      ConnectionString: "Server=mysql;Database=myapp;Uid=root;Pwd=rootpassword;"
      Alert: true
      AdditionalTags:
        - "database"
      HealthCheckConditions:
        SqlBehaviour:
          Query: "SELECT 1"
          ResultExpression: Equal
          SqlResultDataType: Int
          ExpectedResult: 1
      AlertBehaviour:
        - TransportMethod: Console
          TransportName: "DefaultConsole"
          AlertOnce: true
          AlertOnServiceRecovered: true

    # =========================================================================
    # POSTGRESQL MONITORING
    # =========================================================================
    - Name: "PostgreSQL Database"
      ServiceType: PostgreSql
      ConnectionString: "Host=postgres;Database=myapp;Username=user;Password=password;"
      Alert: true
      AdditionalTags:
        - "database"
      HealthCheckConditions:
        SqlBehaviour:
