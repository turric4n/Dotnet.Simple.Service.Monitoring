  # ===========================================================================
  # ALERT BEHAVIOUR REFERENCE
  # ===========================================================================
  # Each health check can have multiple AlertBehaviour entries.
  # Each entry maps to a transport (publisher) by TransportMethod + TransportName.
  #
  # Fields:
  #   TransportMethod:         enum     - See AlertTransportMethod values below
  #   TransportName:           string   - Must match a Name in the corresponding transport settings
  #   AlertOnce:               bool     - Alert only on first failure (reset when recovered)
  #   AlertOnServiceRecovered: bool     - Send alert when service recovers to healthy
  #   AlertEvery:              TimeSpan - Minimum interval between alerts (e.g. "00:05:00")
  #   UsePeriodicAlerting:     bool     - Enable time-window-based alerting
  #   StartAlertingOn:         TimeSpan - Start of alert window (e.g. "08:00:00")
  #   StopAlertingOn:          TimeSpan - End of alert window (e.g. "18:00:00")
  #   AlertByFailCount:        int      - Number of consecutive failures before alerting
  #   PublishAllResults:        bool     - Publish every check result (not just failures)
  #   IncludeEnvironment:      bool     - Include environment name in alert messages
  #   Timezone:                string   - Timezone for alert scheduling (e.g. "UTC", "Europe/Madrid")
  #
  # AlertTransportMethod options (24 methods):
  #   Email, Slack, Telegram, Influx, CustomApi, SignalR, Teams, Discord,
  #   PagerDuty, Opsgenie, Datadog, Prometheus, CloudWatch, AppInsights,
  #   Elasticsearch, GoogleChat, Mattermost, Console, FileLog,
  #   RabbitMq, KafkaTransport, Webhook, RedisTransport, Dummy
  # ===========================================================================

  # ===========================================================================
  # TRANSPORT SETTINGS
  # ===========================================================================
  # Each transport type has its own settings array. The Name field links to
  # AlertBehaviour.TransportName in the health check definitions above.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # EMAIL TRANSPORT
  # ---------------------------------------------------------------------------
  # Env var examples:
  #   Monitoring__EmailTransportSettings__0__Name=PrimaryEmail
  #   Monitoring__EmailTransportSettings__0__SmtpHost=smtp.example.com
  #   Monitoring__EmailTransportSettings__0__Password=secret   <-- use env var for secrets!
  # ---------------------------------------------------------------------------
  EmailTransportSettings:
    - Name: "PrimaryEmail"
      From: "monitoring@example.com"
      DisplayName: "Service Monitor"
      To: "devops@example.com"
      SmtpHost: "smtp.example.com"
      SmtpPort: 587
      Authentication: true
      Username: "monitoring@example.com"
      Password: "your-email-password"

  # ---------------------------------------------------------------------------
  # SLACK TRANSPORT
  # ---------------------------------------------------------------------------
  SlackTransportSettings:
    - Name: "DevOpsSlack"
      Token: "xoxb-your-slack-bot-token"
      Channel: "#devops-alerts"
      Username: "Health Monitor Bot"

  # ---------------------------------------------------------------------------
  # TELEGRAM TRANSPORT
  # ---------------------------------------------------------------------------
  TelegramTransportSettings:
    - Name: "AlertsTelegram"
      BotApiToken: "123456789:ABCdefGHIjklMNOpqrsTUVwxyz"
      ChatId: "-1001234567890"

  # ---------------------------------------------------------------------------
  # INFLUXDB TRANSPORT
  # ---------------------------------------------------------------------------
  InfluxDbTransportSettings:
    - Name: "MetricsInflux"
      Host: "http://influxdb:8086"
      Database: "health_checks"
      AutoCreateDatabase: true
      # RetentionPolicy: ""
      # RetentionDuration: ""
      Version: V1                        # Options: V1, V2
      # Token: ""                        # Required for V2
      # Organization: ""                 # Required for V2

  # ---------------------------------------------------------------------------
  # CUSTOM NOTIFICATION API TRANSPORT
  # ---------------------------------------------------------------------------
  CustomNotificationTransportSettings:
    - Name: "CustomAPI"
      BaseEndpoint: "https://api.example.com/notifications"
      ApiKey: "your-api-key"
      ProjectName: "Monitoring"
      Environment: "Production"

  # ---------------------------------------------------------------------------
  # SIGNALR TRANSPORT
  # ---------------------------------------------------------------------------
  SignalRTransportSettings:
    - Name: "RealtimeHub"
      HubUrl: "https://app.example.com/notificationhub"
      HubMethod: "ReceiveHealthAlert"

  # ---------------------------------------------------------------------------
  # MICROSOFT TEAMS TRANSPORT
  # ---------------------------------------------------------------------------
  TeamsTransportSettings:
    - Name: "DevOpsTeams"
      WebhookUrl: "https://outlook.office.com/webhook/your-webhook-url"

  # ---------------------------------------------------------------------------
  # DISCORD TRANSPORT
  # ---------------------------------------------------------------------------
  DiscordTransportSettings:
    - Name: "AlertsDiscord"
      WebhookUrl: "https://discord.com/api/webhooks/your-webhook-url"
      Username: "Health Monitor Bot"
      AvatarUrl: ""

  # ---------------------------------------------------------------------------
  # PAGERDUTY TRANSPORT
  # ---------------------------------------------------------------------------
  PagerDutyTransportSettings:
    - Name: "CriticalPagerDuty"
      RoutingKey: "your-pagerduty-routing-key"
      Severity: "error"                  # Options: critical, error, warning, info

  # ---------------------------------------------------------------------------
  # OPSGENIE TRANSPORT
  # ---------------------------------------------------------------------------
  OpsgenieTransportSettings:
    - Name: "AlertsOpsgenie"
      ApiKey: "your-opsgenie-api-key"
      Priority: "P3"                     # Options: P1, P2, P3, P4, P5

  # ---------------------------------------------------------------------------
  # DATADOG TRANSPORT
  # ---------------------------------------------------------------------------
  DatadogTransportSettings:
    - Name: "MetricsDatadog"
      ApiKey: "your-datadog-api-key"
      ApplicationKey: "your-datadog-app-key"
      Site: "datadoghq.com"              # Options: datadoghq.com, datadoghq.eu, etc.

  # ---------------------------------------------------------------------------
  # PROMETHEUS TRANSPORT
  # ---------------------------------------------------------------------------
  PrometheusTransportSettings:
    - Name: "MetricsPrometheus"
      PushgatewayUrl: "http://pushgateway:9091"
      JobName: "health_checks"

  # ---------------------------------------------------------------------------
  # AWS CLOUDWATCH TRANSPORT
  # ---------------------------------------------------------------------------
  CloudWatchTransportSettings:
    - Name: "MetricsCloudWatch"
      Region: "us-east-1"
      AccessKey: "your-aws-access-key"
      SecretKey: "your-aws-secret-key"
      Namespace: "HealthChecks"

  # ---------------------------------------------------------------------------
  # APPLICATION INSIGHTS TRANSPORT
  # ---------------------------------------------------------------------------
  AppInsightsTransportSettings:
    - Name: "MetricsAppInsights"
      ConnectionString: "InstrumentationKey=your-key;IngestionEndpoint=https://dc.services.visualstudio.com"
      InstrumentationKey: "your-instrumentation-key"

  # ---------------------------------------------------------------------------
  # ELASTICSEARCH TRANSPORT (for alert indexing)
  # ---------------------------------------------------------------------------
  ElasticsearchTransportSettings:
    - Name: "AlertsElasticsearch"
      Nodes:
        - "http://elasticsearch:9200"
      IndexPrefix: "health-checks"
      # Username: "elastic"
      # Password: "your-password"

  # ---------------------------------------------------------------------------
  # GOOGLE CHAT TRANSPORT
  # ---------------------------------------------------------------------------
  GoogleChatTransportSettings:
    - Name: "AlertsGoogleChat"
      WebhookUrl: "https://chat.googleapis.com/v1/spaces/xxx/messages?key=yyy&token=zzz"

  # ---------------------------------------------------------------------------
  # MATTERMOST TRANSPORT
  # ---------------------------------------------------------------------------
  MattermostTransportSettings:
    - Name: "AlertsMattermost"
      WebhookUrl: "https://mattermost.example.com/hooks/xxx"
      Channel: "devops-alerts"
      Username: "Health Monitor"
      IconUrl: ""

  # ---------------------------------------------------------------------------
  # CONSOLE TRANSPORT (stdout logging)
  # ---------------------------------------------------------------------------
  ConsoleTransportSettings:
    - Name: "DefaultConsole"
      UseColors: true
      OutputFormat: "text"               # Options: text, json

  # ---------------------------------------------------------------------------
  # FILE LOG TRANSPORT
  # ---------------------------------------------------------------------------
  FileTransportSettings:
    - Name: "AlertsFileLog"
      FilePath: "/app/data/health-alerts.log"
      MaxFileSizeBytes: 10485760         # 10MB
      RollingPolicy: "daily"             # Options: daily, size

  # ---------------------------------------------------------------------------
  # RABBITMQ TRANSPORT (publish alerts to queue)
  # ---------------------------------------------------------------------------
  RmqTransportSettings:
    - Name: "AlertsRmq"
      ConnectionString: "amqp://guest:guest@rabbitmq:5672/"
      Exchange: "health_checks"
      RoutingKey: "health.check.result"
      QueueName: "health-alerts"

  # ---------------------------------------------------------------------------
  # KAFKA TRANSPORT (publish alerts to topic)
  # ---------------------------------------------------------------------------
  KafkaTransportSettings:
    - Name: "AlertsKafka"
      BootstrapServers: "kafka:9092"
      Topic: "health-checks"
      ClientId: "health-check-publisher"

  # ---------------------------------------------------------------------------
  # WEBHOOK TRANSPORT (generic HTTP POST)
  # ---------------------------------------------------------------------------
  WebhookTransportSettings:
    - Name: "GenericWebhook"
      WebhookUrl: "https://hooks.example.com/health-alerts"
      HttpBehaviour:
        HttpExpectedCode: 200
        HttpTimeoutMs: 10000
        HttpVerb: Post
      Headers:
        Authorization: "Bearer your-webhook-token"
        Content-Type: "application/json"

  # ---------------------------------------------------------------------------
  # REDIS TRANSPORT (publish alerts to channel)
  # ---------------------------------------------------------------------------
  RedisTransportSettings:
    - Name: "AlertsRedis"
      Host: "redis"
      Port: 6379
      DatabaseNumber: 0

  # ---------------------------------------------------------------------------
  # DICTIONARY TRANSPORT (in-memory, for testing)
  # ---------------------------------------------------------------------------
  # DictionaryTransportSettings:
  #   - Name: "InMemoryTransport"
